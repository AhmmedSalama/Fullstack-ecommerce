<main class="login-page d-flex justify-content-center align-items-center vh-100 p-4">
  <div class="login-card p-4 p-md-5 border-0 rounded-3 shadow-lg">
    <h2 class="login-title text-dark fw-bold text-uppercase mb-4 text-center">
      Login
    </h2>

    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="mb-4">
        <label class="form-label text-muted small fw-semibold text-uppercase">
          Email
        </label>
        <input
          type="email"
          [class.is-invalid]="isError()"
          class="form-control login-input"
          formControlName="email"
        />
      </div>

      <div class="mb-4">
        <label class="form-label text-muted small fw-semibold text-uppercase">
          Password
        </label>
        <input
          type="password"
          [class.is-invalid]="isError()"
          class="form-control login-input"
          formControlName="password"
        />
      </div>

      <button class="btn login-btn w-100 rounded-2 py-3 fw-semibold text-uppercase mt-2 shadow-sm">
        Sign In
      </button>
    </form>
  </div>
</main>

@if (isError()) {
  <div
    class="alert login-alert position-fixed bottom-0 end-0 m-4 rounded-2 d-flex align-items-center"
    role="alert"
  >
    <i class="fa-solid fa-circle-exclamation text-danger me-3 fs-4"></i>
    <div>
      <h6 class="mb-0 fw-bold">Login Failed</h6>
      <small class="text-muted">{{ alertMessage() }}</small>
    </div>
  </div>
}
