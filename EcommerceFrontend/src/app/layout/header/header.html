<header class="sticky-top shadow-sm">
  <nav class="navbar navbar-expand-lg navbar-dark px-3" style="background-color:#0a0a0a;">
    <div class="container-fluid">
      
      <a class="navbar-brand d-flex align-items-center" routerLink="/account" routerLinkActive="profile-active" [routerLinkActiveOptions]="{ exact: true }">
        <i class="fa-solid fa-circle-user" style="font-size: 2.2rem;"></i>
        <span class="ms-2 fs-5">{{ username() | titlecase }}</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" routerLink="/home" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Home</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/orders" routerLinkActive="active-link">Orders</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/FAQs" routerLinkActive="active-link">FAQs</a></li>
          @if(isAdmin()) {
            <li class="nav-item"><a class="nav-link" routerLink="/dashboard" routerLinkActive="active-link">Admin Dashboard</a></li>
          }
        </ul>

        <div class="d-flex align-items-center gap-2">
          @if(showLoginBtns()) {
            <a class="auth-btn" routerLink="/register" routerLinkActive="active-auth">Register</a>
            <a class="auth-btn" routerLink="/login" routerLinkActive="active-auth">Login</a>
          } @else {
            <a class="account-btn" routerLink="/account" routerLinkActive="active-account" [routerLinkActiveOptions]="{ exact: true }">
              <i class="fa-solid fa-gear"></i>
            </a>
            <button class="logout-btn btn" (click)="logout()">Logout</button>
          }
          
          <a class="btn btn-primary position-relative ms-2" routerLink="/cart" routerLinkActive="active-cart" [routerLinkActiveOptions]="{ exact: true }">
            <i class="fa-solid fa-cart-shopping"></i>
            @if(cartQuantity() > 0) {
              <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                {{ cartQuantity() > 99 ? '99+' : cartQuantity() }}
              </span>
            }
          </a>
        </div>
      </div>
    </div>
  </nav>
</header>
